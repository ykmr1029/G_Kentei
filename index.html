<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G検定 学習ポータル</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    h1 { font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 800; color: #4f46e5; margin-bottom: 8px; }
    p.sub { color: #64748b; font-size: 0.95rem; margin-bottom: 40px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 800px;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .card .tag {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 99px;
      margin-bottom: 12px;
    }
    .tag-quiz { background: #eef2ff; color: #4f46e5; }
    .card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .card p { font-size: 0.88rem; color: #64748b; line-height: 1.6; margin-bottom: 16px; }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      background: #4f46e5;
      color: #fff;
      transition: background 0.15s;
    }
    .btn:hover { background: #3730a3; }
  </style>
</head>
<body>
  <h1>G検定 学習ポータル</h1>
  <p class="sub">模擬問題で合格を目指そう</p>

  <div class="grid">
    <div class="card">
      <span class="tag tag-quiz">第1章</span>
      <h2>人工知能の基礎・歴史</h2>
      <p>AI の定義・レベル分け・AI 効果・三度のブームと冬の時代など。4択 15 問。</p>
      <a class="btn" href="quizzes/1章_模擬問題.html">クイズに挑戦 →</a>
    </div>
  </div>
</body>
</html>
