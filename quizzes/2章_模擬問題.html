<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G検定 第2章 模擬問題 — 人工知能をめぐる動向</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --success: #16a34a;
      --danger: #dc2626;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }

    header {
      text-align: center;
      padding: 24px 16px 16px;
      max-width: 720px;
      margin: 0 auto 24px;
    }

    header h1 {
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 6px;
    }

    header p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .progress-wrap {
      max-width: 720px;
      margin: 0 auto 20px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-inner {
      height: 100%;
      background: var(--primary);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 24px;
      max-width: 720px;
      margin: 0 auto;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .question-num {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: clamp(1rem, 2.8vw, 1.15rem);
      font-weight: 600;
      line-height: 1.65;
      margin-bottom: 22px;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .choice-btn {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      cursor: pointer;
      text-align: left;
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .choice-btn:hover:not(:disabled) {
      border-color: var(--primary);
      background: #eef2ff;
      transform: translateY(-1px);
    }

    .choice-btn .label {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }

    .choice-btn.correct {
      border-color: var(--success);
      background: #f0fdf4;
    }

    .choice-btn.correct .label {
      background: var(--success);
      color: #fff;
    }

    .choice-btn.wrong {
      border-color: var(--danger);
      background: #fef2f2;
    }

    .choice-btn.wrong .label {
      background: var(--danger);
      color: #fff;
    }

    .choice-btn:disabled {
      cursor: default;
    }

    .feedback {
      display: none;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .feedback.show { display: block; }

    .feedback.correct-fb {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #14532d;
    }

    .feedback.wrong-fb {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #7f1d1d;
    }

    .feedback strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .btn-next {
      display: none;
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-next.show { display: block; }

    .btn-next:hover { background: var(--primary-dark); transform: translateY(-1px); }

    /* Score screen */
    #score-screen {
      display: none;
      text-align: center;
      max-width: 720px;
      margin: 0 auto;
    }

    #score-screen.show { display: block; }

    .score-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 40px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .score-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: conic-gradient(var(--primary) var(--pct, 0%), var(--border) 0%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      position: relative;
    }

    .score-circle::before {
      content: '';
      width: 108px;
      height: 108px;
      background: var(--card);
      border-radius: 50%;
      position: absolute;
    }

    .score-number {
      position: relative;
      z-index: 1;
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .score-card h2 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .score-card p {
      color: var(--muted);
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .rank {
      display: inline-block;
      margin: 16px 0;
      padding: 6px 20px;
      border-radius: 99px;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .rank-s { background: #fef9c3; color: #854d0e; }
    .rank-a { background: #dbeafe; color: #1e3a8a; }
    .rank-b { background: #f0fdf4; color: #14532d; }
    .rank-c { background: #fef2f2; color: #7f1d1d; }

    .btn-retry {
      margin-top: 24px;
      padding: 14px 40px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-retry:hover { background: var(--primary-dark); }

    .results-list {
      margin-top: 28px;
      text-align: left;
    }

    .results-list h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--muted);
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }

    .result-item:last-child { border-bottom: none; }

    .result-icon {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
    }

    .icon-o { background: var(--success); }
    .icon-x { background: var(--danger); }
  </style>
</head>
<body>

<header>
  <h1>G検定 第2章 模擬問題</h1>
  <p>人工知能をめぐる動向（探索・推論）— 4択 10問</p>
</header>

<div class="progress-wrap" id="progress-wrap">
  <div class="progress-label">
    <span id="prog-text">問題 1 / 10</span>
    <span id="prog-score">正解: 0</span>
  </div>
  <div class="progress-bar"><div class="progress-bar-inner" id="prog-bar"></div></div>
</div>

<div class="card" id="quiz-card">
  <div class="question-num" id="q-num">問題 1</div>
  <div class="question-text" id="q-text"></div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
  <button class="btn-next" id="btn-next">次の問題へ →</button>
</div>

<div id="score-screen">
  <div class="score-card">
    <div class="score-circle" id="score-circle">
      <div class="score-number" id="score-num">0/10</div>
    </div>
    <h2 id="score-title"></h2>
    <p id="score-sub"></p>
    <div class="rank" id="score-rank"></div>
    <br>
    <p style="color:var(--muted);font-size:0.85rem;">G検定の目安: 正答率70%以上で合格ライン</p>
    <button class="btn-retry" onclick="restart()">もう一度挑戦する</button>
    <div class="results-list">
      <h3>問題別 結果一覧</h3>
      <div id="results-detail"></div>
    </div>
  </div>
</div>

<script>
const questions = [
  {
    q: "迷路をコンピュータで扱えるようにツリー構造に変換したものを何と呼ぶか？",
    choices: ["ニューラルネットワーク", "決定木", "探索木", "知識グラフ"],
    answer: 2,
    explanation: "迷路は分岐点・道・終着点の3種類のノードに分けることでツリー構造に変換できます。このツリー構造を「探索木」と呼び、コンピュータが場合分けとして処理できるようになります。"
  },
  {
    q: "探索木において迷路を変換する際に使われる3種類のノードの組み合わせとして正しいものはどれか？",
    choices: [
      "開始点・中間点・終点",
      "根・枝・葉",
      "ノード・エッジ・ゴール",
      "分岐点・道・終着点"
    ],
    answer: 3,
    explanation: "迷路は「分岐点（道が枝分かれしている箇所）」「道（分岐点をつなぐ通路）」「終着点（ゴール）」の3種類のノードに分けることでツリー構造（探索木）に変換できます。"
  },
  {
    q: "幅優先探索（BFS）の探索順序として正しいものはどれか？",
    choices: [
      "1つの経路を行き止まりまで進んでから次の経路を探索する",
      "出発点から近い階層のノードを順番にすべて探索してから次の階層へ進む",
      "ランダムにノードを選んで探索する",
      "ゴールに最も近いノードを優先的に探索する"
    ],
    answer: 1,
    explanation: "幅優先探索は出発点から近いノードを優先し、1階層目をすべて探索してから2階層目、3階層目…という順で横断的に探索します。これにより最短距離でゴールに到達することが保証されます。"
  },
  {
    q: "幅優先探索（BFS）のメリットとして正しいものはどれか？",
    choices: [
      "メモリ消費が少ない",
      "必ず最短距離でゴールに辿り着ける",
      "複雑な迷路でも高速に解ける",
      "行き止まりを無視して探索できる"
    ],
    answer: 1,
    explanation: "幅優先探索のメリットは「必ず最短距離でゴールに辿り着ける」ことです。出発点から近い順に探索するため、最初に発見したゴールへの経路が最短経路になります。一方、デメリットは複雑な迷路ではメモリ不足になりやすい点です。"
  },
  {
    q: "幅優先探索（BFS）のデメリットとして正しいものはどれか？",
    choices: [
      "最短経路が保証されない",
      "行き止まりに当たると先に進めない",
      "複雑な迷路ではメモリ不足になりやすい",
      "深い経路を先に探索してしまう"
    ],
    answer: 2,
    explanation: "幅優先探索のデメリットは「複雑な迷路ではメモリ不足になりやすい」ことです。全階層のノードを記憶しながら探索するため、探索空間が広いほど必要なメモリが膨大になります。"
  },
  {
    q: "深さ優先探索（DFS）の説明として最も適切なものはどれか？",
    choices: [
      "出発点に近いノードから順番に探索する",
      "階層ごとに横断的に探索する",
      "行き止まりに当たったら1つ前のノードに戻って別の経路を探索する",
      "最もゴールに近いノードを優先して探索する"
    ],
    answer: 2,
    explanation: "深さ優先探索は1つの経路を行き止まりまで進み、行き止まりに当たったら1つ前のノードに戻って（バックトラック）別の経路を探索します。記憶するのは直前のノードのみでよいためメモリ消費が少ないのが特徴です。"
  },
  {
    q: "深さ優先探索（DFS）のメリットとして正しいものはどれか？",
    choices: [
      "必ず最短距離でゴールに辿り着ける",
      "メモリ消費が少なくて済む",
      "複雑な問題でも高速に最短経路を見つける",
      "全ての経路を同時に探索できる"
    ],
    answer: 1,
    explanation: "深さ優先探索のメリットは「メモリ消費が少なくて済む」ことです。1つ前のノードに戻って探索し続ければゴールに辿り着けるため、全ノードを記憶する必要がありません。一方、最短経路は保証されないのがデメリットです。"
  },
  {
    q: "幅優先探索と深さ優先探索を比較した場合の説明として正しいものはどれか？",
    choices: [
      "どちらも最短経路を保証する",
      "幅優先探索は最短経路を保証するがメモリ消費が多く、深さ優先探索はメモリ消費が少ないが最短経路は保証されない",
      "深さ優先探索は最短経路を保証するがメモリ消費が多く、幅優先探索はメモリ消費が少ない",
      "どちらもメモリ消費量は同じ"
    ],
    answer: 1,
    explanation: "幅優先探索は「最短経路保証・メモリ大」、深さ優先探索は「メモリ小・最短経路非保証」というトレードオフがあります。G検定ではこの対比が頻出です。"
  },
  {
    q: "探索・推論が主要なテーマとなった人工知能のブームはどれか？",
    choices: [
      "第二次AIブーム（1980年代）",
      "第三次AIブーム（2010年代〜）",
      "第一次AIブーム（1950年代後半〜1960年代）",
      "現在進行中のLLMブーム"
    ],
    answer: 2,
    explanation: "探索・推論は第一次AIブーム（1950年代後半〜1960年代）の主要テーマです。迷路や数学の証明のようなトイ・プロブレムを解くことに成功しました。しかし現実の複雑な問題には対応できずブームが冷めました。"
  },
  {
    q: "深さ優先探索において行き止まりで1つ前のノードに戻る操作を何と呼ぶか？",
    choices: [
      "ロールバック",
      "バックトラック",
      "リバース探索",
      "ノード削除"
    ],
    answer: 1,
    explanation: "行き止まりに当たったとき1つ前のノードに戻って別の経路を試す操作を「バックトラック（backtrack）」と呼びます。深さ優先探索はこのバックトラックを繰り返してゴールを探索します。"
  }
];

let current = 0;
let score = 0;
let answered = [];
let userAnswers = [];

function render() {
  const q = questions[current];
  document.getElementById('q-num').textContent = `問題 ${current + 1}`;
  document.getElementById('q-text').textContent = q.q;

  const labels = ['A', 'B', 'C', 'D'];
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="label">${labels[i]}</span><span>${c}</span>`;
    btn.onclick = () => selectAnswer(i);
    choicesEl.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';

  document.getElementById('btn-next').className = 'btn-next';
  updateProgress();
}

function selectAnswer(idx) {
  const q = questions[current];
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach(b => b.disabled = true);

  const isCorrect = idx === q.answer;
  if (isCorrect) score++;
  userAnswers[current] = { selected: idx, correct: isCorrect };

  buttons[q.answer].classList.add('correct');
  if (!isCorrect) buttons[idx].classList.add('wrong');

  const fb = document.getElementById('feedback');
  fb.innerHTML = `<strong>${isCorrect ? '✓ 正解！' : '✗ 不正解'}</strong>${q.explanation}`;
  fb.className = `feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;

  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = current < questions.length - 1 ? '次の問題へ →' : '結果を見る';
  nextBtn.className = 'btn-next show';

  updateProgress();
}

function updateProgress() {
  const total = questions.length;
  const pct = (current / total) * 100;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `問題 ${current + 1} / ${total}`;
  document.getElementById('prog-score').textContent = `正解: ${score}`;
}

document.getElementById('btn-next').addEventListener('click', () => {
  current++;
  if (current < questions.length) {
    render();
  } else {
    showScore();
  }
});

function showScore() {
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  const screen = document.getElementById('score-screen');
  screen.className = 'show';

  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('score-circle').style.setProperty('--pct', pct + '%');
  document.getElementById('score-num').textContent = `${score}/${total}`;

  let rank, rankClass, title, sub;
  if (pct >= 90) {
    rank = 'S ランク'; rankClass = 'rank-s';
    title = '完璧です！'; sub = '全問正解レベル。G検定合格は確実です。';
  } else if (pct >= 80) {
    rank = 'A ランク'; rankClass = 'rank-a';
    title = '優秀です！'; sub = '合格ラインを大きく超えています。あと少しで完璧！';
  } else if (pct >= 60) {
    rank = 'B ランク'; rankClass = 'rank-b';
    title = 'もう少し！'; sub = '合格ラインまであと一歩。間違えた問題を復習しましょう。';
  } else {
    rank = 'C ランク'; rankClass = 'rank-c';
    title = '要復習'; sub = 'ガイドに戻って重要キーワードを確認しましょう。';
  }

  document.getElementById('score-title').textContent = title;
  document.getElementById('score-sub').textContent = sub;
  const rankEl = document.getElementById('score-rank');
  rankEl.textContent = rank;
  rankEl.className = `rank ${rankClass}`;

  const detail = document.getElementById('results-detail');
  detail.innerHTML = '';
  questions.forEach((q, i) => {
    const ua = userAnswers[i] || { correct: false };
    const item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML = `
      <div class="result-icon ${ua.correct ? 'icon-o' : 'icon-x'}">${ua.correct ? '○' : '✗'}</div>
      <span>Q${i + 1}. ${q.q.length > 40 ? q.q.slice(0, 40) + '…' : q.q}</span>
    `;
    detail.appendChild(item);
  });
}

function restart() {
  current = 0; score = 0; userAnswers = [];
  document.getElementById('quiz-card').style.display = '';
  document.getElementById('progress-wrap').style.display = '';
  document.getElementById('score-screen').className = '';
  render();
}

render();
</script>
</body>
</html>
