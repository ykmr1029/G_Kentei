<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G検定 第2章 模擬問題 — 人工知能をめぐる動向</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #f97316;
      --primary-dark: #ea580c;
      --success: #16a34a;
      --danger: #dc2626;
      --bg: #fffbf0;
      --card: #ffffff;
      --text: #1c1917;
      --muted: #78716c;
      --border: #fed7aa;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
    }

    header {
      text-align: center;
      padding: 24px 16px 16px;
      max-width: 720px;
      margin: 0 auto 24px;
    }

    header h1 {
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 6px;
    }

    header p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .progress-wrap {
      max-width: 720px;
      margin: 0 auto 20px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-inner {
      height: 100%;
      background: var(--primary);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 24px;
      max-width: 720px;
      margin: 0 auto;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .question-num {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: clamp(1rem, 2.8vw, 1.15rem);
      font-weight: 600;
      line-height: 1.65;
      margin-bottom: 22px;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .choice-btn {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      cursor: pointer;
      text-align: left;
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .choice-btn:hover:not(:disabled) {
      border-color: var(--primary);
      background: #fff7ed;
      transform: translateY(-1px);
    }

    .choice-btn .label {
      flex-shrink: 0;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }

    .choice-btn.correct {
      border-color: var(--success);
      background: #f0fdf4;
    }

    .choice-btn.correct .label {
      background: var(--success);
      color: #fff;
    }

    .choice-btn.wrong {
      border-color: var(--danger);
      background: #fef2f2;
    }

    .choice-btn.wrong .label {
      background: var(--danger);
      color: #fff;
    }

    .choice-btn:disabled {
      cursor: default;
    }

    .feedback {
      display: none;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .feedback.show { display: block; }

    .feedback.correct-fb {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #14532d;
    }

    .feedback.wrong-fb {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #7f1d1d;
    }

    .feedback strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .btn-next {
      display: none;
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-next.show { display: block; }

    .btn-next:hover { background: var(--primary-dark); transform: translateY(-1px); }

    /* Score screen */
    #score-screen {
      display: none;
      text-align: center;
      max-width: 720px;
      margin: 0 auto;
    }

    #score-screen.show { display: block; }

    .score-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 40px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .score-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: conic-gradient(var(--primary) var(--pct, 0%), var(--border) 0%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      position: relative;
    }

    .score-circle::before {
      content: '';
      width: 108px;
      height: 108px;
      background: var(--card);
      border-radius: 50%;
      position: absolute;
    }

    .score-number {
      position: relative;
      z-index: 1;
      font-size: 2rem;
      font-weight: 800;
      color: var(--primary);
    }

    .score-card h2 {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .score-card p {
      color: var(--muted);
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .rank {
      display: inline-block;
      margin: 16px 0;
      padding: 6px 20px;
      border-radius: 99px;
      font-weight: 700;
      font-size: 1.1rem;
    }

    .rank-s { background: #fef9c3; color: #854d0e; }
    .rank-a { background: #dbeafe; color: #1e3a8a; }
    .rank-b { background: #f0fdf4; color: #14532d; }
    .rank-c { background: #fef2f2; color: #7f1d1d; }

    .btn-retry {
      margin-top: 24px;
      padding: 14px 40px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-retry:hover { background: var(--primary-dark); }

    .btn-review {
      margin-top: 12px;
      padding: 14px 40px;
      background: #fff;
      color: var(--danger);
      border: 2px solid var(--danger);
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }
    .btn-review:hover { background: var(--danger); color: #fff; }

    .results-list {
      margin-top: 28px;
      text-align: left;
    }

    .results-list h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--muted);
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
    }

    .result-item:last-child { border-bottom: none; }

    .result-icon {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
    }

    .icon-o { background: var(--success); }
    .icon-x { background: var(--danger); }

    .toggle-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #d4cdc8;
      border-radius: 24px;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: var(--primary); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }
  </style>
</head>
<body>

<header>
  <h1>G検定 第2章 模擬問題</h1>
  <p>人工知能をめぐる動向（探索・推論）— 4択 10問</p>
  <div class="toggle-wrap">
    <label class="toggle">
      <input type="checkbox" id="toggle-random" checked onchange="isRandom = this.checked">
      <span class="toggle-slider"></span>
    </label>
    <span>問題・選択肢をランダムに出題</span>
  </div>
</header>

<div class="progress-wrap" id="progress-wrap">
  <div class="progress-label">
    <span id="prog-text">問題 1 / 15</span>
    <span id="prog-score">正解: 0</span>
  </div>
  <div class="progress-bar"><div class="progress-bar-inner" id="prog-bar"></div></div>
</div>

<div class="card" id="quiz-card">
  <div class="question-num" id="q-num">問題 1</div>
  <div class="question-text" id="q-text"></div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
  <button class="btn-next" id="btn-next">次の問題へ →</button>
</div>

<div id="score-screen">
  <div class="score-card">
    <div class="score-circle" id="score-circle">
      <div class="score-number" id="score-num">0/10</div>
    </div>
    <h2 id="score-title"></h2>
    <p id="score-sub"></p>
    <div class="rank" id="score-rank"></div>
    <br>
    <p style="color:var(--muted);font-size:0.85rem;">G検定の目安: 正答率70%以上で合格ライン</p>
    <button class="btn-retry" onclick="restart()">もう一度挑戦する</button>
    <button class="btn-review" id="btn-review" onclick="reviewIncorrect()">間違えた問題を復習する</button>
    <div class="results-list">
      <h3>問題別 結果一覧</h3>
      <div id="results-detail"></div>
    </div>
  </div>
</div>

<script>
const questions = [
  {
    q: "迷路をコンピュータが扱えるツリー構造に変換する際、ノードを分類する3種類として正しいものはどれか。",
    choices: [
      "入口・交差点・出口",
      "分岐点・道・終着点",
      "開始点・中間点・終了点",
      "ルート・ブランチ・リーフ"
    ],
    answer: 1,
    explanation: "迷路は「分岐点・道・終着点」の3種類のノードに分けることでツリー構造（探索木）に変換できる。"
  },
  {
    q: "幅優先探索（BFS）の特徴として正しい説明はどれか。",
    choices: [
      "メモリ消費が少なく、最短経路も保証される",
      "最短距離でゴールに辿り着けるが、複雑な迷路ではメモリ不足になりやすい",
      "1つの経路を末端まで探索してからバックトラックする",
      "評価関数を用いて最適な経路を選択する"
    ],
    answer: 1,
    explanation: "幅優先探索は出発点から近いノードを順に探索するため最短距離を保証するが、全ノードをメモリに保持するためメモリ消費が多い。"
  },
  {
    q: "深さ優先探索（DFS）のメリットとして正しいものはどれか。",
    choices: [
      "必ず最短経路でゴールに辿り着ける",
      "メモリ消費が少ない",
      "計算量が少ない",
      "ヒューリスティックな知識を活用できる"
    ],
    answer: 1,
    explanation: "深さ優先探索は1つ前のノードに戻るだけなので、全経路を保持する必要がなくメモリ消費が少ない。ただし最短経路は保証されない。"
  },
  {
    q: "幅優先探索（BFS）と深さ優先探索（DFS）の比較として誤っているものはどれか。",
    choices: [
      "BFSは最短経路を保証するが、DFSは保証しない",
      "DFSはBFSよりメモリ消費が少ない",
      "BFSは階層ごとに横断して探索する",
      "DFSはBFSより常に高速に解を発見できる"
    ],
    answer: 3,
    explanation: "DFSは最短経路が保証されず、運が悪ければ時間がかかる場合もある。「常に高速」というのは誤りで、状況によってはBFSの方が速く解を発見できる。"
  },
  {
    q: "ハノイの塔の問題をコンピュータで解く際の考え方として正しいものはどれか。",
    choices: [
      "円盤の重さを数値で表し、最適化問題として解く",
      "各円盤がどのポールにあるかを座標（状態）で表し、探索木問題として解く",
      "円盤の移動順序を事前にルールとして定義しておく",
      "ニューラルネットワークを用いて学習させる"
    ],
    answer: 1,
    explanation: "ハノイの塔は、3つの円盤それぞれがどのポールにあるかを座標（状態）で表すことで、迷路と同様の探索木問題に置き換えることができる。"
  },
  {
    q: "STRIPS（Stanford Research Institute Problem Solver）の説明として正しいものはどれか。",
    choices: [
      "ロボットの画像認識を行うためのフレームワーク",
      "前提条件・行動・結果の3要素で行動を定義し、ロボットの行動計画を立てる手法",
      "ゲームAIの探索アルゴリズムの一種",
      "自然言語処理のための文法解析システム"
    ],
    answer: 1,
    explanation: "STRIPSは「前提条件・行動・結果」の3要素でロボットの行動を定義し計画を立てる手法。ロボットの行動計画（プランニング）の基礎となった。"
  },
  {
    q: "テリー・ウィノグラードが1968〜1970年に研究した、積み木の世界でロボットに自然言語で指示を与えるシステムの名称はどれか。",
    choices: [
      "Cyc",
      "STRIPS",
      "SHRDLU",
      "AlphaGo"
    ],
    answer: 2,
    explanation: "SHRDLUはテリー・ウィノグラードが1968〜1970年に開発した「積み木の世界」のシステム。自然言語でロボットに積み木を操作させた。STRIPSの研究ベースとなり、その後Cycプロジェクトへと引き継がれた。"
  },
  {
    q: "Cycプロジェクトの目的として最も適切なものはどれか。",
    choices: [
      "囲碁AIを開発するプロジェクト",
      "ロボットの自律走行を実現するプロジェクト",
      "人間の常識的知識をコンピュータに取り込むプロジェクト",
      "深層学習を用いた画像認識を研究するプロジェクト"
    ],
    answer: 2,
    explanation: "CycプロジェクトはSHRDLUの後継として、人間の常識的知識をコンピュータに大規模に取り込む研究プロジェクト。"
  },
  {
    q: "2016年3月、韓国のプロ棋士イ・セドルを破った囲碁AIの名称と開発した会社の組み合わせとして正しいものはどれか。",
    choices: [
      "DeepBlue・IBM",
      "AlphaGo・DeepMind",
      "AlphaZero・OpenAI",
      "AlphaGo・Google Brain"
    ],
    answer: 1,
    explanation: "2016年3月、DeepMind社が開発したAlphaGoが韓国のプロ棋士イ・セドルを破った。囲碁は約10の360乗通りの組み合わせがあり、従来のゲームAIでの攻略は困難とされていた。"
  },
  {
    q: "ボードゲームのAIにおいて「ヒューリスティックな知識」とは何を指すか。",
    choices: [
      "ゲームのルールを記述した知識",
      "既知の経験や知識をもとに探索を効率化するための知識",
      "ニューラルネットワークの重みパラメータ",
      "相手の手を全パターン列挙した知識ベース"
    ],
    answer: 1,
    explanation: "ヒューリスティックな知識とは、既知の経験・知識をもとに探索を効率化するための知識。ボードゲームでは盤面の有利・不利を評価するスコア（評価関数）などがこれにあたる。"
  },
  {
    q: "Mini-Max法の説明として正しいものはどれか。",
    choices: [
      "自分のターンでは自分のスコアが最大、相手のターンでは自分のスコアが最小になるよう数手先から逆算して最善手を選ぶ",
      "明らかに選ばれない枝を刈り取ることでMini-Max法を効率化する手法",
      "ランダムなサンプリングで最善手を推定する手法",
      "評価関数を使わずにすべての末端ノードを探索する手法"
    ],
    answer: 0,
    explanation: "Mini-Max法は自分のターンでスコア最大化、相手のターンでスコア最小化（自分視点）を繰り返し、数手先から逆算して最善手を決定する。シンプルだが全候補を評価するため非効率。"
  },
  {
    q: "αβ法（Alpha-Beta Pruning）に関する説明として正しいものはどれか。",
    choices: [
      "Mini-Max法とは独立した別のアルゴリズムで、評価関数を使わない",
      "Mini-Max法を改良し、明らかに選ばれない枝を枝刈りして探索量を削減する手法",
      "深さ優先探索に幅優先探索を組み合わせたハイブリッド手法",
      "強化学習を用いてボードゲームを学習させる手法"
    ],
    answer: 1,
    explanation: "αβ法はMini-Max法を改良したアルゴリズム。明らかに選ばれない候補（枝）を「枝刈り（pruning）」して探索量を大幅に削減する。ただし枝刈りの精度は評価関数の質に依存する。"
  },
  {
    q: "第一次AIブームで主に研究されたアプローチとして最も適切なものはどれか。",
    choices: [
      "ディープラーニングによる画像認識",
      "探索・推論によるトイ・プロブレムの解決",
      "大規模言語モデルによる自然言語処理",
      "強化学習によるゲームAI"
    ],
    answer: 1,
    explanation: "第一次AIブーム（1950年代後半〜1960年代）では、迷路やパズル・数学証明などのトイ・プロブレムを探索・推論で解くことに成功した。ディープラーニングや大規模言語モデルは第三次AIブーム以降の技術。"
  },
  {
    q: "ロボットの行動計画のことを何と呼ぶか。",
    choices: [
      "スケジューリング",
      "プランニング",
      "マッピング",
      "インファレンス"
    ],
    answer: 1,
    explanation: "ロボットがどのように行動するかの計画を「プランニング」と呼ぶ。STRIPSはプランニングを「前提条件・行動・結果」の3要素で表現する代表的な手法。"
  },
  {
    q: "Mini-Max法とαβ法を比較した際に正しい説明はどれか。",
    choices: [
      "αβ法はMini-Max法より結果の質は低いが高速",
      "αβ法はMini-Max法と同じ結果を、より少ない探索量で得られる",
      "Mini-Max法の方がαβ法より一般的に効率的",
      "αβ法は評価関数を使わないため常にMini-Max法より優れる"
    ],
    answer: 1,
    explanation: "αβ法はMini-Max法の改良版。不要な枝を刈り取ることで探索量を削減しながら、Mini-Max法と同等の最善手を求めることができる。"
  },
  {
    q: "「人工無能」の説明として最も適切なものはどれか？",
    choices: [
      "人間の知能を完全に模倣した汎用的な人工知能システム",
      "特定のルールや手順に従って機械的に会話を行うプログラムで、内容を「理解」していない",
      "ディープラーニングを使って人間の感情を認識するシステム",
      "チューリングテストに合格した高性能な対話AIシステム"
    ],
    answer: 1,

let isRandom = true;

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function prepareQuestions(qs) {
  const list = isRandom ? shuffleArray(qs) : qs;
  return list.map(q => {
    if (!isRandom) return { ...q, choices: [...q.choices] };
    const indexed = q.choices.map((c, i) => ({ text: c, isCorrect: i === q.answer }));
    const shuffled = shuffleArray(indexed);
    return { ...q, choices: shuffled.map(c => c.text), answer: shuffled.findIndex(c => c.isCorrect) };
  });
}

let current = 0;
let score = 0;
let answered = [];
let userAnswers = [];
let activeQuestions = prepareQuestions(questions);

function render() {
  const q = activeQuestions[current];
  document.getElementById('q-num').textContent = `問題 ${current + 1}`;
  document.getElementById('q-text').textContent = q.q;

  const labels = ['A', 'B', 'C', 'D'];
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="label">${labels[i]}</span><span>${c}</span>`;
    btn.onclick = () => selectAnswer(i);
    choicesEl.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';

  document.getElementById('btn-next').className = 'btn-next';
  updateProgress();
}

function selectAnswer(idx) {
  const q = activeQuestions[current];
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach(b => b.disabled = true);

  const isCorrect = idx === q.answer;
  if (isCorrect) score++;
  userAnswers[current] = { selected: idx, correct: isCorrect };

  buttons[q.answer].classList.add('correct');
  if (!isCorrect) buttons[idx].classList.add('wrong');

  const fb = document.getElementById('feedback');
  fb.innerHTML = `<strong>${isCorrect ? '✓ 正解！' : '✗ 不正解'}</strong>${q.explanation}`;
  fb.className = `feedback show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;

  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = current < activeQuestions.length - 1 ? '次の問題へ →' : '結果を見る';
  nextBtn.className = 'btn-next show';

  updateProgress();
}

function updateProgress() {
  const total = activeQuestions.length;
  const pct = (current / total) * 100;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `問題 ${current + 1} / ${total}`;
  document.getElementById('prog-score').textContent = `正解: ${score}`;
}

document.getElementById('btn-next').addEventListener('click', () => {
  current++;
  if (current < activeQuestions.length) {
    render();
  } else {
    showScore();
  }
});

function showScore() {
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  const screen = document.getElementById('score-screen');
  screen.className = 'show';

  const total = activeQuestions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('score-circle').style.setProperty('--pct', pct + '%');
  document.getElementById('score-num').textContent = `${score}/${total}`;

  let rank, rankClass, title, sub;
  if (pct >= 90) {
    rank = 'S ランク'; rankClass = 'rank-s';
    title = '完璧です！'; sub = '全問正解レベル。G検定合格は確実です。';
  } else if (pct >= 80) {
    rank = 'A ランク'; rankClass = 'rank-a';
    title = '優秀です！'; sub = '合格ラインを大きく超えています。あと少しで完璧！';
  } else if (pct >= 60) {
    rank = 'B ランク'; rankClass = 'rank-b';
    title = 'もう少し！'; sub = '合格ラインまであと一歩。間違えた問題を復習しましょう。';
  } else {
    rank = 'C ランク'; rankClass = 'rank-c';
    title = '要復習'; sub = 'ガイドに戻って重要キーワードを確認しましょう。';
  }

  document.getElementById('score-title').textContent = title;
  document.getElementById('score-sub').textContent = sub;
  const rankEl = document.getElementById('score-rank');
  rankEl.textContent = rank;
  rankEl.className = `rank ${rankClass}`;

  const detail = document.getElementById('results-detail');
  detail.innerHTML = '';
  activeQuestions.forEach((q, i) => {
    const ua = userAnswers[i] || { correct: false };
    const item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML = `
      <div class="result-icon ${ua.correct ? 'icon-o' : 'icon-x'}">${ua.correct ? '○' : '✗'}</div>
      <span>Q${i + 1}. ${q.q.length > 40 ? q.q.slice(0, 40) + '…' : q.q}</span>
    `;
    detail.appendChild(item);
  });

  const hasIncorrect = userAnswers.some(ua => ua && !ua.correct);
  document.getElementById('btn-review').style.display = hasIncorrect ? '' : 'none';
}

function restart() {
  activeQuestions = prepareQuestions(questions);
  current = 0; score = 0; userAnswers = [];
  document.getElementById('quiz-card').style.display = '';
  document.getElementById('progress-wrap').style.display = '';
  document.getElementById('score-screen').className = '';
  render();
}

function reviewIncorrect() {
  const incorrect = activeQuestions.filter((_, i) => userAnswers[i] && !userAnswers[i].correct);
  if (incorrect.length === 0) return;
  activeQuestions = incorrect;
  current = 0; score = 0; userAnswers = [];
  document.getElementById('quiz-card').style.display = '';
  document.getElementById('progress-wrap').style.display = '';
  document.getElementById('score-screen').className = '';
  render();
}

render();
</script>
